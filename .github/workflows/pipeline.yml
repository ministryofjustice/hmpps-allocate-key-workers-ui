name: Pipeline [test -> build -> deploy]

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      additional_docker_tag:
        description: Additional docker tag that can be used to specify stable or testing tags
        required: false
        default: ''
        type: string
      push:
        description: Push docker image to registry flag
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  # Only cancel in progress when on a branch - use SHA on main to ensure uniqueness.
  # This will allow multiple pipelines to run at the same time on main.
  # Note that two pipelines running within a few minutes of each other will cause issues with helm deploying to
  # a namespace, as the second one will not be able to get a lock as a deploy will be in progress.
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Determines whether the pipeline should publish the docker image.
  # Referenced by build and deploy jobs to avoid repeating the condition.
  check_publish:
    name: Check publish flag
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ github.ref == 'refs/heads/main' && (inputs.push || inputs.push == null) }}
    steps:
      - name: Set publish flag
        run: echo "Publishing enabled ${{ github.ref == 'refs/heads/main' && (inputs.push || inputs.push == null) }}"
  # main node build workflow
  node_build:
    name: node build
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/node_build.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      install_command: 'npm run setup'
  # generic node unit tests - feel free to override with local tests if required
  node_unit_tests:
    name: node unit tests
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/node_unit_tests.yml@v2 # WORKFLOW_VERSION
    needs: [node_build]
    secrets: inherit
  # generic node integration tests using wiremock - feel free to override with local tests if required
  node_integration_tests:
    name: node integration tests
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/node_integration_tests.yml@v2 # WORKFLOW_VERSION
    needs: [node_build]
    secrets: inherit
  generate_unit_tests_report:
    name: generate unit tests report
    runs-on: ubuntu-latest
    if: always()
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: download test artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        path: artifacts
        pattern: npm_*_test_artifacts
    - name: create reports
      shell: bash
      run: |
        npx junit-to-ctrf artifacts/npm_unit_test_artifacts/jest/junit.xml -o artifacts/npm_unit_test_artifacts/jest/ctrf.json
        npx github-actions-ctrf tests artifacts/npm_unit_test_artifacts/jest/ctrf.json
        npx github-actions-ctrf failed-folded artifacts/npm_unit_test_artifacts/jest/ctrf.json
        npx github-actions-ctrf tests artifacts/npm_integration_test_artifacts/ctrf/ctrf-report.json
        npx github-actions-ctrf failed-folded artifacts/npm_integration_test_artifacts/ctrf/ctrf-report.json
    - name: Upload coverage results to Codecov
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    needs:
      - node_integration_tests
      - node_unit_tests
  helm_lint:
    strategy:
      matrix:
        environments: ['dev', 'preprod', 'prod']
    name: helm lint
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/test_helm_lint.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: ${{ matrix.environments }}
  build:
    name: Build docker image from hmpps-github-actions
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/docker_build.yml@v2 # WORKFLOW_VERSION
    needs:
      - node_integration_tests
      - node_unit_tests
      - check_publish
    with:
      docker_registry: 'ghcr.io'
      registry_org: 'ministryofjustice'
      additional_docker_tag: ${{ inputs.additional_docker_tag }}
      push: ${{ needs.check_publish.outputs.enabled == 'true' }}
      docker_multiplatform: false
      generate_sbom: ${{ needs.check_publish.outputs.enabled == 'true' }}
      attach_sbom_to_registry: ${{ needs.check_publish.outputs.enabled == 'true' }}
      sign_image: ${{ needs.check_publish.outputs.enabled == 'true' }}
  deploy_dev:
    name: Deploy to the development environment
    if: needs.check_publish.outputs.enabled == 'true'
    needs:
      - build
      - helm_lint
      - check_publish
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'dev'
      app_version: '${{ needs.build.outputs.app_version }}'
  sentry_dev:
    name: Sentry for Dev
    if: needs.check_publish.outputs.enabled == 'true'
    needs:
      - build
      - deploy_dev
      - check_publish
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/sentry_release_and_deploy.yml@v2
    with:
      sentry_project: ${{ github.event.repository.name }}
      sentry_environment: 'dev'
      sentry_create_release: 'true'
      app_version: '${{ needs.build.outputs.app_version }}'
    secrets: inherit
  deploy_preprod:
    name: Deploy to pre-production environment
    if: needs.check_publish.outputs.enabled == 'true'
    needs:
      - build
      - deploy_dev
      - check_publish
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'preprod'
      app_version: '${{ needs.build.outputs.app_version }}'
  sentry_preprod:
    name: Sentry for Preprod
    if: needs.check_publish.outputs.enabled == 'true'
    needs:
      - build
      - deploy_preprod
      - check_publish
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/sentry_release_and_deploy.yml@v2
    with:
      sentry_project: ${{ github.event.repository.name }}
      sentry_environment: 'preprod'
      sentry_create_release: 'false'
      app_version: '${{ needs.build.outputs.app_version }}'
    secrets: inherit
  deploy_prod:
    name: Deploy to production environment
    if: needs.check_publish.outputs.enabled == 'true'
    needs:
      - build
      - deploy_preprod
      - check_publish
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'prod'
      app_version: '${{ needs.build.outputs.app_version }}'
      slack_notification: 'true'
  sentry_prod:
    name: Sentry for Prod
    if: needs.check_publish.outputs.enabled == 'true'
    needs:
      - build
      - deploy_prod
      - check_publish
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/sentry_release_and_deploy.yml@v2
    with:
      sentry_project: ${{ github.event.repository.name }}
      sentry_environment: 'prod'
      sentry_create_release: 'false'
      app_version: '${{ needs.build.outputs.app_version }}'
    secrets: inherit
